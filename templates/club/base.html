{% load static %}
<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Tesalia Motoclub{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,600;9..40,700;9..40,800;9..40,900&family=Space+Grotesk:wght@500;600;700&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,300..700,0..1,-50..200&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{% static 'club/styles.css' %}" />
  </head>
  <body class="{% block body_class %}{% endblock %}">
    {% block nav %}
    {% endblock %}

    <main class="app">
      {% if messages %}
        <div class="toast-stack" aria-live="polite" aria-atomic="true">
          {% for message in messages %}
            <div class="toast toast--{{ message.tags|default:'info' }}">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
      {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="{% static 'club/app.js' %}"></script>
    {% if user.is_authenticated %}
    <script>
      (function() {
        const notiAudio = new Audio("{% static 'sonidos/noti.mp3' %}");
        let lastNotificationCheck = Date.now();

        setInterval(async () => {
          try {
            const res = await fetch(`/api/notifications/check/?since=${lastNotificationCheck}`);
            if (!res.ok) return;
            const data = await res.json();
            
            if (data.has_new_events) {
              // Intenta reproducir el sonido
              notiAudio.play().catch(e => console.log('Bloqueado por el navegador:', e));
              
              // Actualiza el DOM en segundo plano
              try {
                  const feedRes = await fetch(window.location.href);
                  const html = await feedRes.text();
                  const parser = new DOMParser();
                  const doc = parser.parseFromString(html, 'text/html');
                  
                  // 1. Actualizar Publicaciones (Feed)
                  const newPosts = doc.querySelectorAll('.post');
                  const feedContainer = document.querySelector('.feed');
                  const storiesEl = document.querySelector('.stories');
                  
                  let insertAfterEl = storiesEl;
                  
                  newPosts.forEach(newPost => {
                      if (!newPost.id) return; // Si es un post fallback sin id, ignorar
                      const currentPost = document.getElementById(newPost.id);
                      
                      if (!currentPost) {
                          // Nuevo post, insertarlo
                          if (insertAfterEl && insertAfterEl.nextSibling) {
                              insertAfterEl.parentNode.insertBefore(newPost, insertAfterEl.nextSibling);
                          } else if (feedContainer) {
                              feedContainer.appendChild(newPost);
                          }
                          insertAfterEl = newPost;
                      } else {
                          // Post existente, actualizar sus comentarios
                          const newCommentsList = newPost.querySelector('.comments__list');
                          const currentCommentsList = currentPost.querySelector('.comments__list');
                          const currentCommentsContainer = currentPost.querySelector('.comments');
                          
                          if (newCommentsList) {
                              if (currentCommentsList) {
                                  currentCommentsList.innerHTML = newCommentsList.innerHTML;
                              } else if (currentCommentsContainer) {
                                  const form = currentCommentsContainer.querySelector('.commentform');
                                  if (form) {
                                      currentCommentsContainer.insertBefore(newCommentsList, form);
                                  } else {
                                      currentCommentsContainer.prepend(newCommentsList);
                                  }
                              }
                          }
                          insertAfterEl = currentPost;
                      }
                  });
                  
                  // 2. Actualizar panel de Solicitudes de Amistad
                  const findPanelByTitle = (dom, title) => {
                      const titles = dom.querySelectorAll('.panel__title');
                      for (let t of titles) {
                          if (t.textContent.trim() === title) return t.parentNode;
                      }
                      return null;
                  };
                  
                  const newReqPanel = findPanelByTitle(doc, 'Solicitudes');
                  const currentReqPanel = findPanelByTitle(document, 'Solicitudes');
                  if (newReqPanel && currentReqPanel) {
                      currentReqPanel.innerHTML = newReqPanel.innerHTML;
                  }
              } catch (domErr) {
                  console.error('Error actualizando DOM', domErr);
              }
            }
            lastNotificationCheck = data.now;
          } catch (e) {
            console.error('Error en notificaciones', e);
          }
        }, 5000);
      })();
    </script>
    {% endif %}
    {% block scripts %}{% endblock %}
  </body>
</html>
